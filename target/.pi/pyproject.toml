[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "dpaa"
version = "0.1.0"
requires-python = ">=3.10"
dependencies = [
    "markdown-it-py>=3.0",
    "PyYAML>=6.0",
    "networkx>=3.0",
    "typer>=0.12",
    "pydantic>=2.0",
    "jsonschema>=4.0",
]

[project.optional-dependencies]
syntactic = ["stanza>=1.8"]
dev = ["pytest>=8.0", "pytest-cov>=5.0"]

[project.scripts]
dpaa = "dpaa.cli:app"
sbadr = "sbadr.cli:app"
