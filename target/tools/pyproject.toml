[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "devcenter-tools"
version = "0.2.0"
requires-python = ">=3.10"
dependencies = [
    "markdown-it-py>=3.0",
    "PyYAML>=6.0",
    "networkx>=3.0",
    "typer>=0.12",
    "pydantic>=2.0",
    "jsonschema>=4.0",
]

[project.optional-dependencies]
sbadr = []   # no extra Python deps — uses Stanford CoreNLP via HTTP
dev = ["pytest>=8.0", "pytest-cov>=5.0"]

[project.scripts]
dpaa = "dpaa.cli:app"
sbadr = "sbadr.cli:app"

[tool.hatch.build.targets.wheel]
packages = ["dpaa", "sbadr"]
